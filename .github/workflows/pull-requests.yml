name: 'Terraform PR Validation'

on:
  pull_request:
    branches: [ "main" ]
    paths: [ "terraform/**" ]

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  TF_VERSION: '1.14.3'
  AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
  TF_IN_AUTOMATION: true

jobs:
  terraform-fmt:
    name: 'Format Check'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: ./terraform

  terraform-validate:
    name: 'Validate'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: ./terraform
      
      - name: Terraform Validate
        run: terraform validate
        working-directory: ./terraform

  security-scan:
    name: 'Security Scan'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: './terraform'
          soft_fail: true

  terraform-lint:
    name: 'Lint'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
      
      - name: Init TFLint
        run: tflint --init
        working-directory: ./terraform
      
      - name: Run TFLint
        run: tflint --format compact
        working-directory: ./terraform

  terraform-plan:
    name: 'Plan'
    runs-on: ubuntu-latest
    needs: [terraform-fmt, terraform-validate, security-scan, terraform-lint]
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_vpc_id: ${{ vars.TF_VAR_vpc_id }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform
      
      - name: Terraform Plan
        run: terraform plan -no-color -out=tfplan
        working-directory: ./terraform
      
      # Subir plan y ZIP para que main los use
      - name: Upload Plan for Main
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.event.pull_request.head.sha }}
          path: |
            terraform/tfplan
            terraform/lambda_function.zip
          retention-days: 7
      
      - name: Comment Plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            
            try {
              const planOutput = execSync('cd terraform && terraform show -no-color tfplan', { encoding: 'utf8' });
              
              const comment = `## 🏗️ Terraform Plan
              
              <details>
              <summary>📋 Click to expand plan details</summary>
              
              \`\`\`hcl
              ${planOutput}
              \`\`\`
              
              </details>
              
              **Plan Status:** ✅ Success
              **Triggered by:** @${{ github.actor }}
              **Commit:** ${{ github.sha }}
              **Artifacts:** Plan and Lambda ZIP uploaded for main deployment`;
              
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (error) {
              console.log('Could not post comment:', error.message);
            }