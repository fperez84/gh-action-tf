name: 'Terraform PR Validation'

on:
  pull_request:
    branches: [ "main" ]
    paths: 
      - "terraform/**"
      - ".github/workflows/pull-requests.yml"

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  TF_VERSION: '1.14.3'
  AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
  TF_IN_AUTOMATION: true
  ENVIRONMENT: 'dev'

jobs:
  terraform-fmt:
    name: 'Format Check'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: ./terraform

  terraform-validate:
    name: 'Validate'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: ./terraform
      
      - name: Terraform Validate
        run: terraform validate
        working-directory: ./terraform

  security-scan:
    name: 'Security Scan'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: './terraform'
          soft_fail: true

  terraform-lint:
    name: 'Lint'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
      
      - name: Init TFLint
        run: tflint --init
        working-directory: ./terraform
      
      - name: Run TFLint
        run: tflint --format compact
        working-directory: ./terraform

  snyk-security:
    name: 'Snyk IaC Security'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/iac@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          file: terraform/
          sarif: true
          args: --severity-threshold=medium

      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk.sarif

  infracost:
    name: 'Cost Estimation'
    runs-on: ubuntu-latest
    needs: [terraform-fmt, terraform-validate, security-scan, terraform-lint, snyk-security]
    env:
      TF_ROOT: terraform/

    steps:
      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: '${{ github.event.pull_request.base.ref }}'

      - name: Generate Infracost cost estimate baseline
        run: |
          infracost breakdown --path=${TF_ROOT} \
                              --format=json \
                              --out-file=/tmp/infracost-base.json

      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Generate Infracost diff
        run: |
          infracost diff --path=${TF_ROOT} \
                          --format=json \
                          --compare-to=/tmp/infracost-base.json \
                          --out-file=/tmp/infracost.json

      - name: Post Infracost comment
        run: |
          infracost comment github --path=/tmp/infracost.json \
                                   --repo=$GITHUB_REPOSITORY \
                                   --github-token=${{ github.token }} \
                                   --pull-request=${{ github.event.pull_request.number }} \
                                   --behavior=update
  terraform-plan:
    name: 'Plan'
    runs-on: ubuntu-latest
    needs: [terraform-fmt, terraform-validate, security-scan, terraform-lint, snyk-security]
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_vpc_id: ${{ vars.TF_VAR_vpc_id }}
      TF_VAR_environment: dev

    outputs:
      plan_cache_key: ${{ steps.plan_info.outputs.cache_key }}
      plan_hash: ${{ steps.plan_info.outputs.plan_hash }}
      zip_hash: ${{ steps.plan_info.outputs.zip_hash }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Plan
        run: terraform plan -no-color -out=tfplan
        working-directory: ./terraform

      - name: Generate Plan Information
        id: plan_info
        run: |
          # Generar hashes para verificación
          PLAN_HASH=$(sha256sum terraform/tfplan | cut -d' ' -f1)
          ZIP_HASH=$(sha256sum terraform/lambda_function.zip | cut -d' ' -f1)
          
          # Crear cache key único para este plan
          CACHE_KEY="terraform-approved-plan-${{ github.event.pull_request.head.sha }}"
          
          echo "plan_hash=$PLAN_HASH" >> $GITHUB_OUTPUT
          echo "zip_hash=$ZIP_HASH" >> $GITHUB_OUTPUT
          echo "cache_key=$CACHE_KEY" >> $GITHUB_OUTPUT
          
          echo "✅ Plan generated:"
          echo "  Plan hash: $PLAN_HASH"
          echo "  ZIP hash: $ZIP_HASH"
          echo "  Cache key: $CACHE_KEY"
      
      - name: Create Plan Metadata
        run: |
          CURRENT_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          
          cat > plan_metadata.json << EOF
          {
            "commit_sha": "${{ github.event.pull_request.head.sha }}",
            "pr_number": ${{ github.event.pull_request.number }},
            "plan_hash": "${{ steps.plan_info.outputs.plan_hash }}",
            "zip_hash": "${{ steps.plan_info.outputs.zip_hash }}",
            "created_at": "${{ github.event.pull_request.created_at }}",
            "author": "${{ github.event.pull_request.user.login }}",
            "title": "${{ github.event.pull_request.title }}",
            "workflow_run_id": "${{ github.run_id }}",
            "timestamp": "$CURRENT_TIMESTAMP",
            "source": "pr_workflow",
            "environment": "dev",
            "cache_key": "${{ steps.plan_info.outputs.cache_key }}"
          }
          EOF
          
          echo "📋 Created plan metadata:"
          cat plan_metadata.json
      
      # Cache del plan aprobado para main
      - name: Cache Approved Plan for Main
        uses: actions/cache/save@v4
        with:
          path: |
            terraform/tfplan
            terraform/lambda_function.zip
            plan_metadata.json
          key: ${{ steps.plan_info.outputs.cache_key }}
      
      - name: Comment Plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');
            
            try {
              const planOutput = execSync('cd terraform && terraform show -no-color tfplan', { encoding: 'utf8' });
              
              // Leer metadata
              let metadataInfo = '';
              try {
                const metadata = JSON.parse(fs.readFileSync('plan_metadata.json', 'utf8'));
                metadataInfo = `
              **📋 Plan Metadata:**
              - **Commit SHA:** \`${metadata.commit_sha}\`
              - **Plan Hash:** \`${metadata.plan_hash}\`
              - **ZIP Hash:** \`${metadata.zip_hash}\`
              - **Cache Key:** \`${metadata.cache_key}\`
              - **Environment:** ${metadata.environment}
              - **Created:** ${metadata.timestamp}`;
              } catch (e) {
                metadataInfo = `
              **📋 Plan Details:**
              - **Commit SHA:** \`${{ github.event.pull_request.head.sha }}\`
              - **Plan Hash:** \`${{ steps.plan_info.outputs.plan_hash }}\`
              - **ZIP Hash:** \`${{ steps.plan_info.outputs.zip_hash }}\`
              - **Cache Key:** \`${{ steps.plan_info.outputs.cache_key }}\``;
              }
              
              const comment = `## 🏗️ Terraform Plan (Approved for Deployment)
              ${metadataInfo}
              
              <details>
              <summary>📋 Click to expand plan details</summary>
              
              \`\`\`hcl
              ${planOutput}
              \`\`\`
              
              </details>
              
              **✅ This exact plan will be applied when merged to main**
              
              **Plan Status:** ✅ Success  
              **Triggered by:** @${{ github.actor }}  
              **PR:** #${{ github.event.pull_request.number }}`;
              
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (error) {
              console.log('Could not post comment:', error.message);
            }
