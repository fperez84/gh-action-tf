name: 'Terraform AWS Infrastructure'

on:
  push:
    branches: [ "main" ]
    paths: [ "terraform/**" ]
  pull_request:
    branches: [ "main" ]
    paths: [ "terraform/**" ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  TF_VERSION: '1.14.3'
  AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
  TF_IN_AUTOMATION: true

jobs:
  # VALIDATION JOBS - Solo en Pull Requests
  terraform-fmt:
    name: 'Terraform Format Check'
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: ./terraform

  terraform-validate:
    name: 'Terraform Validate'
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: ./terraform
      
      - name: Terraform Validate
        run: terraform validate
        working-directory: ./terraform

  security-scan:
    name: 'Security Scan'
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: './terraform'
          soft_fail: true

  terraform-lint:
    name: 'Terraform Lint'
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
      
      - name: Init TFLint
        run: tflint --init
        working-directory: ./terraform
      
      - name: Run TFLint
        run: tflint --format compact
        working-directory: ./terraform

  # PLAN JOB para Pull Requests - después de validaciones
  terraform-plan-pr:
    name: 'Terraform Plan (PR)'
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [terraform-fmt, terraform-validate, security-scan, terraform-lint]
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_vpc_id: ${{ vars.TF_VAR_vpc_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform
      
      - name: Terraform Plan
        run: terraform plan -no-color -out=tfplan
        working-directory: ./terraform
        id: plan
      
      # Comentario en PR con el plan
      - name: Comment Plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            
            try {
              const planOutput = execSync('cd terraform && terraform show -no-color tfplan', { encoding: 'utf8' });
              
              const comment = `## Terraform Plan
              
              <details>
              <summary>📋 Click to expand plan details</summary>
              
              \`\`\`hcl
              ${planOutput}
              \`\`\`
              
              </details>
              
              **Plan Status:** ✅ Success
              **Triggered by:** @${{ github.actor }}
              **Commit:** ${{ github.sha }}`;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (error) {
              console.log('Error generating plan comment:', error);
            }

  # PLAN JOB para Main - directo, sin dependencias
  terraform-plan-main:
    name: 'Terraform Plan (Main)'
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_vpc_id: ${{ vars.TF_VAR_vpc_id }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      # Descargar estado anterior si existe
      - name: Download Previous State
        uses: actions/download-artifact@v4
        with:
          name: terraform-state
          path: terraform/
        continue-on-error: true
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform
      
      - name: Terraform Plan
        run: terraform plan -no-color -out=tfplan
        working-directory: ./terraform
      
      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/tfplan
          retention-days: 1

  # APPLY JOB - Solo en push a main
  terraform-apply:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    needs: [terraform-plan-main]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_vpc_id: ${{ vars.TF_VAR_vpc_id }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      # Descargar estado anterior
      - name: Download Previous State
        uses: actions/download-artifact@v4
        with:
          name: terraform-state
          path: terraform/
        continue-on-error: true
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: terraform/
      
      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform
      
      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: ./terraform
      
      # Subir nuevo estado después del apply
      - name: Upload New State
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state
          path: terraform/terraform.tfstate
          retention-days: 30
