# .coderabbit.yaml
language: "en"

reviews:
  profile: "assertive"   # "chill" = solo issues críticos, "assertive" = review detallado
  auto_review:
    enabled: true
    drafts: false

  # path_filters solo para EXCLUIR cosas que no quieres que revise
  path_filters:
    - "!**/*.tfstate"          # Excluir state files
    - "!**/*.tfstate.backup"
    - "!**/.terraform/**"      # Excluir dependencias descargadas
    - "!**/lambda_function.zip" # Excluir el zip compilado

  # Instrucciones específicas por tipo de archivo
  path_instructions:
    - path: "terraform/**/*.tf"
      instructions: |
        Review this Terraform code focusing on:
        - IAM permissions: flag overly permissive policies (*)
        - Security groups: flag ingress rules open to 0.0.0.0/0
        - Encryption: ensure storage resources have encryption enabled
        - Resource naming: should follow pattern {project}-{environment}-{resource}
        - Missing tags on resources

    - path: "terraform/lambda_function.py"
      instructions: |
        Review this AWS Lambda function focusing on:
        - Error handling and exception management
        - Sensitive data not hardcoded (use os.environ instead)
        - Efficient use of Lambda context and timeout considerations
        - Logging with proper log levels (avoid logging sensitive data)
